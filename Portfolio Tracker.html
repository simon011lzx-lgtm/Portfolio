function getDb() { return _db; }

function initFirebase(config) {
  try {
    if (firebase.apps.length) firebase.apps.forEach(a => a.delete());
    firebase.initializeApp(config);
    _db = firebase.firestore();
    return true;
  } catch(e) { return false; }

async function saveToCloud(portfolioId, data) {
  const db = getDb(); if (!db) return;
  const history = (data.history || []).map(h => ({
    date: h.date instanceof Date ? h.date.toISOString() : h.date,
    value: h.value
  }));
  await db.collection('portfolios').doc(portfolioId).set({
    positions: data.positions,
    history,
    cash: data.cash,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

async function loadFromCloud(portfolioId) {
  const db = getDb(); if (!db) return null;
  const doc = await db.collection('portfolios').doc(portfolioId).get();
  if (!doc.exists) return null;
  const d = doc.data();
  return {
    positions: d.positions || [],
    history: (d.history || []).map(h => ({ ...h, date: new Date(h.date) })),
    cash: d.cash || 0,
    updatedAt: d.updatedAt?.toDate?.() || null
  };
}

function genPortfolioId() {
  return Math.random().toString(36).slice(2,8) + Math.random().toString(36).slice(2,8);
}

// ─── IBKR CLIENT PORTAL API ──────────────────────────────────────────────────
async function ibkrFetch(base, path, opts = {}) {
  const url = base.replace(/\/$/, '') + path;
  const res = await fetch(url, { ...opts, credentials: 'include' });
  if (!res.ok) throw new Error(`IBKR ${res.status}: ${res.statusText}`);
  return res.json();
}

async function ibkrGetAccounts(base) {
  return ibkrFetch(base, '/portfolio/accounts');
}

async function ibkrGetPositions(base, accountId) {
  // IBKR returns pages; grab first page (up to 30 positions)
  const page0 = await ibkrFetch(base, `/portfolio/${accountId}/positions/0`);
  return Array.isArray(page0) ? page0 : [];
}

async function ibkrGetSummary(base, accountId) {
  return ibkrFetch(base, `/portfolio/${accountId}/summary`);
}

async function ibkrTickle(base) {
  try { await ibkrFetch(base, '/tickle', { method: 'POST' }); } catch {}
}

function ibkrPositionsToApp(raw) {
  return raw
    .filter(p => p.assetClass === 'STK' && p.position !== 0)
    .map(p => ({
      symbol: p.ticker || p.contractDesc || '?',
      desc: p.fullName || p.contractDesc || '',
      sector: p.sector || 'Unknown',
      qty: p.position,
      cost: p.avgCost || 0,
      mark: p.mktPrice || 0,
    }));
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(n);
const fmtFull = n => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
const fmtPct = n => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
const fmtDelta = n => (n >= 0 ? '+' : '') + fmtFull(n);

const SECTOR_COLORS = {
  'Technology': '#2563EB', 'Financials': '#7C3AED', 'Healthcare': '#059669',
  'Energy': '#D97706', 'Utilities': '#0891B2', 'Real Estate': '#DB2777',
  'Consumer': '#65A30D', 'Industrials': '#6B7280',
  'Information Technology': '#2563EB', 'Health Care': '#059669',
  'Communication Services': '#0891B2', 'Consumer Discretionary': '#65A30D',
  'Consumer Staples': '#84CC16', 'Materials': '#F59E0B',
  'Unknown': '#9CA3AF',
};

function genHistory(positions, cash) {
  const today = new Date();
  const days = [];
  let base = positions.reduce((s, p) => s + p.qty * p.cost, 0) + cash;
  for (let i = 89; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    if (d.getDay() === 0 || d.getDay() === 6) continue;
    const noise = (Math.random() - 0.42) * base * 0.012;
    base = Math.max(base + noise, base * 0.85);
    days.push({ date: d, value: Math.round(base * 100) / 100 });
  }
  const curVal = positions.reduce((s, p) => s + p.qty * p.mark, 0) + cash;
  days[days.length - 1].value = curVal;
  return days;
}

function parseFlexXML(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');
  const positions = [];
  doc.querySelectorAll('OpenPosition').forEach(p => {
    const symbol = p.getAttribute('symbol');
    const qty = parseFloat(p.getAttribute('position') || '0');
    const mark = parseFloat(p.getAttribute('markPrice') || '0');
    const cost = parseFloat(p.getAttribute('costBasisPrice') || '0');
    const assetCategory = p.getAttribute('assetCategory');
    if (symbol && qty !== 0 && (assetCategory === 'STK' || assetCategory === 'OPT'))
      positions.push({ symbol, desc: p.getAttribute('description') || symbol, sector: assetCategory === 'OPT' ? 'Options' : 'Unknown', qty, cost, mark, currency: 'USD', assetType: assetCategory });
  });
  const equitySummary = [];
  doc.querySelectorAll('NetAssetValueInBase, NAVInBase').forEach(e => {
    const d = e.getAttribute('reportDate') || e.getAttribute('date');
    const v = parseFloat(e.getAttribute('total') || e.getAttribute('nav') || '0');
    if (d && v) equitySummary.push({ date: new Date(d), value: v });
  });
  if (!equitySummary.length) {
    doc.querySelectorAll('EquitySummaryByReportDateInBase').forEach(e => {
      const d = e.getAttribute('reportDate');
      const v = parseFloat(e.getAttribute('total') || '0');
      if (d && v) equitySummary.push({ date: new Date(d), value: v });
    });
  }
  equitySummary.sort((a, b) => a.date - b.date);
  let cash = null;
  doc.querySelectorAll('CashReportCurrency').forEach(c => {
    const isBase = c.getAttribute('isBase') === 'Y' || c.getAttribute('isBase') === '1';
    const ending = parseFloat(c.getAttribute('endingCash') || c.getAttribute('endingSettledCash') || '0');
    if ((c.getAttribute('currency') === 'USD' || isBase) && ending !== 0) cash = ending;
  });
  if (cash === null) {
    const cr = doc.querySelector('CashReport');
    if (cr) cash = parseFloat(cr.getAttribute('endingCash') || '0') || null;
  }
  return { positions: positions.length ? positions : null, history: equitySummary.length ? equitySummary : null, cash };
}

// ─── DONUT CHART ─────────────────────────────────────────────────────────────
function DonutChart({ positions }) {
  const [hovered, setHovered] = useState(null);
  const sectorMap = {};
  positions.forEach(p => {
    const s = p.sector || 'Unknown';
    sectorMap[s] = (sectorMap[s] || 0) + p.mark * p.qty;
  });
  const total = Object.values(sectorMap).reduce((a, b) => a + b, 0);
  const sectors = Object.entries(sectorMap).sort((a, b) => b[1] - a[1]);
  const CX = 90, CY = 90, R = 72, INNER = 44;
  let angle = -Math.PI / 2;
  const slices = sectors.map(([name, val]) => {
    const pct = val / total;
    const start = angle;
    angle += pct * 2 * Math.PI;
    const end = angle;
    const x1 = CX + R * Math.cos(start), y1 = CY + R * Math.sin(start);
    const x2 = CX + R * Math.cos(end), y2 = CY + R * Math.sin(end);
    const xi1 = CX + INNER * Math.cos(start), yi1 = CY + INNER * Math.sin(start);
    const xi2 = CX + INNER * Math.cos(end), yi2 = CY + INNER * Math.sin(end);
    const large = pct > 0.5 ? 1 : 0;
    const path = `M ${xi1} ${yi1} L ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${INNER} ${INNER} 0 ${large} 0 ${xi1} ${yi1} Z`;
    return { name, val, pct, path, color: SECTOR_COLORS[name] || '#9CA3AF' };
  });

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 24, flexWrap: 'wrap' }}>
      <svg viewBox="0 0 180 180" style={{ width: 150, flexShrink: 0 }}>
        {slices.map(s => (
          <path key={s.name} d={s.path} fill={s.color}
            opacity={hovered && hovered !== s.name ? 0.3 : 1}
            style={{ cursor: 'pointer', transition: 'opacity 0.15s' }}
            onMouseEnter={() => setHovered(s.name)} onMouseLeave={() => setHovered(null)} />
        ))}
        <text x={CX} y={CY - 8} textAnchor="middle" fontSize="9" fill="#9C9A94" fontFamily="DM Sans">EQUITY</text>
        <text x={CX} y={CY + 8} textAnchor="middle" fontSize="13" fontWeight="600" fill="#141413" fontFamily="DM Mono">{fmt(total)}</text>
      </svg>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 7, flex: 1, minWidth: 160 }}>
        {slices.map(s => (
          <div key={s.name} style={{ display: 'flex', alignItems: 'center', gap: 8, opacity: hovered && hovered !== s.name ? 0.3 : 1, transition: 'opacity 0.15s', cursor: 'default' }}
            onMouseEnter={() => setHovered(s.name)} onMouseLeave={() => setHovered(null)}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: s.color, flexShrink: 0 }} />
            <span style={{ fontSize: 12, flex: 1, color: 'var(--text-secondary)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{s.name}</span>
            <span style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--text-primary)', flexShrink: 0 }}>{(s.pct * 100).toFixed(1)}%</span>
            <span style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--text-tertiary)', flexShrink: 0, minWidth: 60, textAlign: 'right' }}>{fmt(s.val)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── LINE CHART ──────────────────────────────────────────────────────────────
function LineChart({ data }) {
  const [hover, setHover] = useState(null);
  const svgRef = useRef(null);
  const W = 600, H = 200, PAD = { t: 16, r: 16, b: 32, l: 64 };
  const cW = W - PAD.l - PAD.r, cH = H - PAD.t - PAD.b;
  const vals = data.map(d => d.value);
  const minV = Math.min(...vals) * 0.995, maxV = Math.max(...vals) * 1.005;
  const xScale = i => (i / (data.length - 1)) * cW;
  const yScale = v => cH - ((v - minV) / (maxV - minV)) * cH;
  const linePath = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xScale(i).toFixed(1)} ${yScale(d.value).toFixed(1)}`).join(' ');
  const areaPath = linePath + ` L ${xScale(data.length-1).toFixed(1)} ${cH} L 0 ${cH} Z`;
  const xLabels = [0, Math.floor(data.length * 0.25), Math.floor(data.length * 0.5), Math.floor(data.length * 0.75), data.length - 1];
  const lineColor = data[data.length-1].value >= data[0].value ? '#1A9E6A' : '#D94F3A';
  const handleMouseMove = e => {
    const rect = svgRef.current.getBoundingClientRect();
    const x = (e.clientX - rect.left - PAD.l) * (W / rect.width);
    const idx = Math.max(0, Math.min(data.length - 1, Math.round((x / cW) * (data.length - 1))));
    setHover({ idx, x: xScale(idx), y: yScale(data[idx].value), d: data[idx] });
  };
  return (
    <div style={{ position: 'relative' }}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block', cursor: 'crosshair' }} onMouseMove={handleMouseMove} onMouseLeave={() => setHover(null)}>
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={lineColor} stopOpacity="0.15" />
            <stop offset="100%" stopColor={lineColor} stopOpacity="0" />
          </linearGradient>
        </defs>
        <g transform={`translate(${PAD.l},${PAD.t})`}>
          {[0, 0.25, 0.5, 0.75, 1].map(f => {
            const v = minV + f * (maxV - minV), y = yScale(v);
            return <g key={f}><line x1={0} y1={y} x2={cW} y2={y} stroke="#E8E6E0" strokeWidth="1" /><text x={-6} y={y+4} textAnchor="end" fontSize="10" fill="#9C9A94" fontFamily="DM Mono">{fmt(v)}</text></g>;
          })}
          <path d={areaPath} fill="url(#areaGrad)" />
          <path d={linePath} fill="none" stroke={lineColor} strokeWidth="2" strokeLinejoin="round" />
          {xLabels.map(i => <text key={i} x={xScale(i)} y={cH+20} textAnchor="middle" fontSize="10" fill="#9C9A94" fontFamily="DM Mono">{data[i]?.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</text>)}
          {hover && <><line x1={hover.x} y1={0} x2={hover.x} y2={cH} stroke="#D4D0C8" strokeWidth="1" strokeDasharray="3,3" /><circle cx={hover.x} cy={hover.y} r={4} fill={lineColor} stroke="white" strokeWidth="2" /></>}
        </g>
      </svg>
      {hover && (
        <div style={{ position: 'absolute', top: 8, left: Math.min(hover.x / 600 * 100, 65) + '%', background: 'var(--text-primary)', color: 'white', borderRadius: 6, padding: '6px 10px', fontSize: 12, fontFamily: 'var(--font-mono)', pointerEvents: 'none', whiteSpace: 'nowrap' }}>
          <div style={{ opacity: 0.6, fontSize: 10 }}>{hover.d.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
          <div style={{ fontWeight: 500, fontSize: 14 }}>{fmt(hover.d.value)}</div>
        </div>
      )}
    </div>
  );
}

// ─── BAR CHART ───────────────────────────────────────────────────────────────
function BarChart({ positions }) {
  const sorted = [...positions].sort((a, b) => (b.mark - b.cost) * b.qty - (a.mark - a.cost) * a.qty);
  const pnls = sorted.map(p => (p.mark - p.cost) * p.qty);
  const maxAbs = Math.max(...pnls.map(Math.abs));
  const W = 600, BAR_H = 26, GAP = 6, PAD_L = 52, PAD_R = 80;
  const H = sorted.length * (BAR_H + GAP) + 8;
  const zero = PAD_L + (W - PAD_L - PAD_R) / 2;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }}>
      {sorted.map((pos, i) => {
        const pnl = pnls[i], pct = (pos.mark - pos.cost) / pos.cost * 100;
        const barW = Math.abs(pnl) / maxAbs * ((W - PAD_L - PAD_R) / 2 - 4);
        const x = pnl >= 0 ? zero : zero - barW, y = i * (BAR_H + GAP);
        const color = pnl >= 0 ? '#1A9E6A' : '#D94F3A';
        return <g key={pos.symbol}>
          <text x={PAD_L - 6} y={y + BAR_H/2 + 4} textAnchor="end" fontSize="11" fontFamily="DM Mono" fontWeight="500" fill="#141413">{pos.symbol}</text>
          <rect x={zero - (W - PAD_L - PAD_R)/2} y={y} width={W - PAD_L - PAD_R} height={BAR_H} fill="#F7F7F5" rx="3" />
          <rect x={x} y={y} width={Math.max(barW, 2)} height={BAR_H} fill={color} rx="3" opacity="0.85" />
          <text x={zero + (W - PAD_L - PAD_R)/2 + 6} y={y + BAR_H/2 + 4} fontSize="10" fontFamily="DM Mono" fill={color} fontWeight="500">{pnl >= 0 ? '+' : ''}{fmt(pnl)}</text>
          <text x={zero + (W - PAD_L - PAD_R)/2 + 6} y={y + BAR_H/2 + 14} fontSize="9" fontFamily="DM Mono" fill="#9C9A94">{fmtPct(pct)}</text>
        </g>;
      })}
      <line x1={zero} y1={0} x2={zero} y2={H} stroke="#D4D0C8" strokeWidth="1" />
    </svg>
  );
}

// ─── POSITIONS TABLE ─────────────────────────────────────────────────────────
function PositionsTable({ positions, compact }) {
  const [sort, setSort] = useState({ key: 'pnl', dir: -1 });
  const toggle = key => setSort(s => ({ key, dir: s.key === key ? -s.dir : -1 }));
  const rows = useMemo(() => [...positions].map(p => ({ ...p, value: p.mark * p.qty, pnl: (p.mark - p.cost) * p.qty, pnlPct: (p.mark - p.cost) / p.cost * 100 })).sort((a, b) => (a[sort.key] > b[sort.key] ? 1 : -1) * sort.dir), [positions, sort]);
  const totalValue = rows.reduce((s, r) => s + r.value, 0);
  const Th = ({ k, children, align = 'left' }) => (
    <th onClick={() => toggle(k)} style={{ padding: compact ? '8px 12px' : '10px 14px', textAlign: align, fontSize: 10, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-tertiary)', cursor: 'pointer', userSelect: 'none', whiteSpace: 'nowrap', borderBottom: '1px solid var(--border)', background: '#FAFAF8' }}>
      {children} {sort.key === k ? (sort.dir === 1 ? '↑' : '↓') : ''}
    </th>
  );
  return (
    <div style={{ overflow: 'auto' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: compact ? 12 : 13 }}>
        <thead><tr><Th k="symbol">Ticker</Th><Th k="desc">Name</Th><Th k="sector">Sector</Th><Th k="qty" align="right">Qty</Th><Th k="cost" align="right">Avg Cost</Th><Th k="mark" align="right">Last</Th><Th k="value" align="right">Mkt Value</Th><Th k="pnl" align="right">Unreal P&amp;L</Th><Th k="pnlPct" align="right">%</Th></tr></thead>
        <tbody>
          {rows.map((r, i) => {
            const pos = r.pnl >= 0;
            return (
              <tr key={r.symbol} style={{ borderBottom: '1px solid var(--border)', background: i % 2 === 0 ? 'white' : '#FAFAF8' }}>
                <td style={{ padding: compact ? '7px 12px' : '10px 14px', fontFamily: 'var(--font-mono)', fontWeight: 600, fontSize: compact ? 11 : 12 }}><span style={{ background: 'var(--accent-light)', color: 'var(--accent)', padding: '2px 6px', borderRadius: 4 }}>{r.symbol}</span></td>
                <td style={{ padding: compact ? '7px 12px' : '10px 14px', color: 'var(--text-secondary)', maxWidth: 160, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.desc}</td>
                <td style={{ padding: compact ? '7px 12px' : '10px 14px' }}><span style={{ fontSize: 10, padding: '2px 7px', borderRadius: 4, background: (SECTOR_COLORS[r.sector] || '#999') + '18', color: SECTOR_COLORS[r.sector] || '#999', fontWeight: 500 }}>{r.sector}</span></td>
                <td style={{ padding: compact ? '7px 12px' : '10px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{r.qty}</td>
                <td style={{ padding: compact ? '7px 12px' : '10px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)', color: 'var(--text-secondary)' }}>{fmtFull(r.cost)}</td>
                <td style={{ padding: compact ? '7px 12px' : '10px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{fmtFull(r.mark)}</td>
                <td style={{ padding: compact ? '7px 12px' : '10px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: 500 }}>{fmt(r.value)}</td>
                <td style={{ padding: compact ? '7px 12px' : '10px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: 600, color: pos ? 'var(--gain)' : 'var(--loss)' }}>{fmtDelta(r.pnl)}</td>
                <td style={{ padding: compact ? '7px 12px' : '10px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)', fontSize: 11 }}><span style={{ background: pos ? 'var(--gain-bg)' : 'var(--loss-bg)', color: pos ? 'var(--gain)' : 'var(--loss)', padding: '2px 6px', borderRadius: 4 }}>{fmtPct(r.pnlPct)}</span></td>
              </tr>
            );
          })}
        </tbody>
        <tfoot>
          <tr style={{ background: '#F0EFE8', borderTop: '2px solid var(--border-strong)' }}>
            <td colSpan={6} style={{ padding: compact ? '8px 12px' : '10px 14px', fontWeight: 600, fontSize: 11, letterSpacing: '0.04em', textTransform: 'uppercase', color: 'var(--text-secondary)' }}>Total Equity</td>
            <td style={{ padding: compact ? '8px 12px' : '10px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)', fontWeight: 700 }}>{fmt(totalValue)}</td>
            <td colSpan={2} />
          </tr>
        </tfoot>
      </table>
    </div>
  );
}

// ─── FIREBASE SETUP MODAL ────────────────────────────────────────────────────
function FirebaseSetupModal({ onDone, onSkip }) {
  const [step, setStep] = useState(1);
  const [configText, setConfigText] = useState('');
  const [error, setError] = useState('');

  const handleConnect = () => {
    setError('');
    try {
      const match = configText.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('Could not find config object');
      const config = JSON.parse(match[0].replace(/(\w+):/g, '"$1":').replace(/'/g, '"'));
      if (!config.apiKey || !config.projectId) throw new Error('Missing apiKey or projectId');
      const ok = initFirebase(config);
      if (!ok) throw new Error('Firebase failed to initialize');
      localStorage.setItem('fb_config', JSON.stringify(config));
      onDone(config);
    } catch(e) {
      setError('Could not parse config: ' + e.message);
    }
  };

  return (
    <div className="modal-overlay">
      <div className="modal">
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 22, marginBottom: 6 }}>Connect Firebase</div>
        <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 24 }}>One-time setup to enable cloud sync &amp; shareable links. Free, takes ~3 minutes.</div>

        {step === 1 && <>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16, marginBottom: 24 }}>
            <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
              <span className="step-badge">1</span>

                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>Create a Firebase project</div>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.6 }}>Go to <a href="https://console.firebase.google.com" target="_blank" style={{ color: 'var(--accent)' }}>console.firebase.google.com</a> → click <strong>Add project</strong> → name it anything → skip Google Analytics → <strong>Create project</strong>.</div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
              <span className="step-badge">2</span>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>Add a Web App</div>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.6 }}>In your project, click the <strong>&lt;/&gt;</strong> icon → give it a nickname → <strong>Register app</strong>. You'll see a <code>firebaseConfig</code> snippet.</div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
              <span className="step-badge">3</span>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>Enable Firestore</div>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.6 }}>Left sidebar → <strong>Build → Firestore Database</strong> → <strong>Create database</strong> → <strong>Start in test mode</strong> → pick any region → <strong>Done</strong>.</div>
              </div>
            </div>
          </div>
          <button className="btn-primary" onClick={() => setStep(2)} style={{ width: '100%' }}>I've done this →</button>
          <button className="btn-ghost" onClick={onSkip} style={{ width: '100%', marginTop: 10 }}>Skip for now (use offline only)</button>
        </>}

        {step === 2 && <>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Paste your <code>firebaseConfig</code> here</div>
          <div className="code-block">{`const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "your-app.firebaseapp.com",
  projectId: "your-app",
  storageBucket: "your-app.appspot.com",
  messagingSenderId: "123456",
  appId: "1:123..."
};`}</div>
          <textarea rows={8} placeholder="Paste your firebaseConfig here..." value={configText} onChange={e => setConfigText(e.target.value)} style={{ marginTop: 12 }} />
          {error && <div style={{ fontSize: 12, color: 'var(--loss)', marginTop: 8 }}>{error}</div>}
          <div style={{ display: 'flex', gap: 10, marginTop: 16 }}>
            <button className="btn-ghost" onClick={() => setStep(1)}>← Back</button>

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [positions, setPositions] = useState(SAMPLE_POSITIONS);
  const [history, setHistory] = useState(null);
  const [cash, setCash] = useState(DEFAULT_CASH);
  const [uploadStatus, setUploadStatus] = useState(null);
  const [activeTab, setActiveTab] = useState('overview');
  const [showSetup, setShowSetup] = useState(false);
  const [showShare, setShowShare] = useState(false);
  const [showIBKR, setShowIBKR] = useState(false);
  const [firebaseReady, setFirebaseReady] = useState(false);
  const [portfolioId, setPortfolioId] = useState('');
  const [syncStatus, setSyncStatus] = useState(null);
  const [isViewOnly, setIsViewOnly] = useState(false);
  // IBKR live state
  const [ibkrLive, setIbkrLive] = useState(false);
  const [ibkrBase, setIbkrBase] = useState('');
  const [ibkrAccount, setIbkrAccount] = useState('');
  const [ibkrAccounts, setIbkrAccounts] = useState([]);
  const [ibkrDayPnL, setIbkrDayPnL] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [ibkrError, setIbkrError] = useState('');
  const refreshTimer = useRef(null);
  const fileRef = useRef(null);

  const hist = useMemo(() => history || genHistory(positions, cash), [positions, history, cash]);

  const metrics = useMemo(() => {
    const totalEquity = positions.reduce((s, p) => s + p.mark * p.qty, 0);
    const totalCost = positions.reduce((s, p) => s + p.cost * p.qty, 0);
    const unrealizedPnL = totalEquity - totalCost;
    const unrealizedPct = totalCost > 0 ? unrealizedPnL / totalCost * 100 : 0;
    const totalVal = totalEquity + (tweaks.showCash ? cash : 0);
    return { totalVal, totalEquity, unrealizedPnL, unrealizedPct };
  }, [positions, cash, tweaks.showCash]);

  // On mount: check URL for ?id= OR restore Firebase config
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const sharedId = params.get('id');
    if (sharedId) {
      setIsViewOnly(true);
      setPortfolioId(sharedId);
      const savedConfig = localStorage.getItem('fb_config');
      const config = savedConfig ? JSON.parse(savedConfig) : DEFAULT_FIREBASE_CONFIG;
      try {
        initFirebase(config);
        setFirebaseReady(true);
        setSyncStatus('syncing');
        loadFromCloud(sharedId).then(data => {
          if (data) { setPositions(data.positions); if (data.history?.length) setHistory(data.history); setCash(data.cash || DEFAULT_CASH); setSyncStatus('synced'); }
          else setSyncStatus('error');
        });
      } catch(e) { setSyncStatus('error'); }
    } else {
      const savedConfig = localStorage.getItem('fb_config');
      const savedId = localStorage.getItem('portfolio_id') || genPortfolioId();
      localStorage.setItem('portfolio_id', savedId);
      setPortfolioId(savedId);
      const config = savedConfig ? JSON.parse(savedConfig) : DEFAULT_FIREBASE_CONFIG;
      try {
        initFirebase(config);
        setFirebaseReady(true);
        setSyncStatus('syncing');
        loadFromCloud(savedId).then(data => {
          if (data) { setPositions(data.positions); if (data.history?.length) setHistory(data.history); setCash(data.cash || DEFAULT_CASH); setSyncStatus('synced'); }
          else setSyncStatus(null);
        });
      } catch(e) {}
    }
  }, []);

  // Tweaks messaging
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // IBKR auto-refresh every 30s
  const fetchIBKRData = useCallback(async (base, accountId) => {
    try {
      setIbkrError('');
      const [rawPositions, summary] = await Promise.all([
        ibkrGetPositions(base, accountId),
        ibkrGetSummary(base, accountId).catch(() => null),
      ]);
      // Keep session alive
      ibkrTickle(base);
      const mapped = ibkrPositionsToApp(rawPositions);
      if (mapped.length) setPositions(mapped);
      if (summary) {
        const cashVal = summary.totalcashvalue?.amount ?? summary.totalcashvalue?.USD ?? null;
        if (cashVal != null) setCash(cashVal);
        const dayPnl = summary.dailypnl?.amount ?? summary.dailypnl?.USD ?? null;
        setIbkrDayPnL(dayPnl);
      }
      setLastUpdated(new Date());
    } catch(e) {
      setIbkrError('Refresh failed: ' + (e.message || 'unknown error'));
    }
  }, []);

  useEffect(() => {
    if (!ibkrLive || !ibkrBase || !ibkrAccount) return;
    fetchIBKRData(ibkrBase, ibkrAccount);
    refreshTimer.current = setInterval(() => fetchIBKRData(ibkrBase, ibkrAccount), 30000);
    return () => clearInterval(refreshTimer.current);
  }, [ibkrLive, ibkrBase, ibkrAccount, fetchIBKRData]);

  const handleIBKRConnect = (base, accountId, accounts) => {
    setIbkrBase(base);
    setIbkrAccount(accountId);
    setIbkrAccounts(accounts);
    setIbkrLive(true);
    setShowIBKR(false);
  };

  const disconnectIBKR = () => {
    setIbkrLive(false);
    setIbkrAccount('');
    setIbkrBase('');
    setIbkrDayPnL(null);
    setLastUpdated(null);
    clearInterval(refreshTimer.current);
  };

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const handleFirebaseSetup = (config) => {
    initFirebase(config);
    setFirebaseReady(true);
    setShowSetup(false);
    if (isViewOnly && portfolioId) {
      setSyncStatus('syncing');
      loadFromCloud(portfolioId).then(data => {
        if (data) { setPositions(data.positions); if (data.history?.length) setHistory(data.history); setCash(data.cash || DEFAULT_CASH); setSyncStatus('synced'); }
        else setSyncStatus('error');
      });
    }
  };

  const handleFile = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    setUploadStatus('loading');
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const { positions: parsed, history: h, cash: parsedCash } = parseFlexXML(ev.target.result);
        if (parsed?.length) {
          setPositions(parsed);
          if (h?.length) setHistory(h);
          if (parsedCash != null) setCash(parsedCash);
          setUploadStatus('success');
          if (firebaseReady && portfolioId) {
            setSyncStatus('syncing');
            try { await saveToCloud(portfolioId, { positions: parsed, history: h || [], cash: parsedCash || cash }); setSyncStatus('synced'); }
            catch { setSyncStatus('error'); }
          }
        } else { setUploadStatus('empty'); }
      } catch { setUploadStatus('error'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const tabs = [{ id: 'overview', label: 'Overview' }, { id: 'positions', label: 'Positions' }, { id: 'pnl', label: 'P&L Analysis' }];

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)', '--gain': tweaks.gainColor, '--loss': tweaks.lossColor, '--accent': tweaks.accentColor, '--accent-light': tweaks.accentColor + '18' }}>
      {showSetup && <FirebaseSetupModal onDone={handleFirebaseSetup} onSkip={() => setShowSetup(false)} />}
      {showShare && <ShareModal portfolioId={portfolioId} onClose={() => setShowShare(false)} />}
      {showIBKR && <IBKRLiveModal onConnect={handleIBKRConnect} onClose={() => setShowIBKR(false)} />}

      <header style={{ background: 'var(--surface)', borderBottom: '1px solid var(--border)', padding: '0 28px', height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, zIndex: 10, boxShadow: 'var(--shadow-sm)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
          <div>
            <span style={{ fontFamily: 'var(--font-display)', fontSize: 18, letterSpacing: '-0.01em' }}>Portfolio</span>
            <span style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 18, color: tweaks.accentColor, marginLeft: 4 }}>Tracker</span>
          </div>
          {isViewOnly && <span style={{ fontSize: 11, background: '#FFF7ED', color: '#92400E', border: '1px solid #FDE68A', padding: '3px 8px', borderRadius: 4, fontWeight: 600 }}>View Only</span>}
          {ibkrLive && (
            <span style={{ fontSize: 11, background: 'var(--gain-bg)', color: 'var(--gain)', border: '1px solid #6EE7B7', padding: '3px 8px', borderRadius: 4, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 5 }}>
              <span className="live-dot" /> IBKR Live · {ibkrAccount}
            </span>
          )}
          {!isViewOnly && <>
            <div style={{ width: 1, height: 20, background: 'var(--border-strong)' }} />
            <nav style={{ display: 'flex', gap: 2 }}>
              {tabs.map(t => <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ padding: '6px 14px', borderRadius: 6, border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 500, fontFamily: 'var(--font-body)', background: activeTab === t.id ? tweaks.accentColor + '18' : 'transparent', color: activeTab === t.id ? tweaks.accentColor : 'var(--text-secondary)', transition: 'all 0.15s' }}>{t.label}</button>)}
            </nav>
          </>}
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          {lastUpdated && <span style={{ fontSize: 11, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>↻ {lastUpdated.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}</span>}
          {ibkrError && <span style={{ fontSize: 11, color: 'var(--loss)', background: 'var(--loss-bg)', padding: '3px 8px', borderRadius: 4 }} title={ibkrError}>⚠ Live error</span>}
          {syncStatus === 'syncing' && <span style={{ fontSize: 11, color: '#6B6860', fontFamily: 'var(--font-mono)' }}>↑ Syncing...</span>}
          {syncStatus === 'synced' && <span style={{ fontSize: 11, color: 'var(--gain)', background: 'var(--gain-bg)', padding: '3px 8px', borderRadius: 4, fontFamily: 'var(--font-mono)' }}>✓ Cloud synced</span>}
          {syncStatus === 'error' && <span style={{ fontSize: 11, color: 'var(--loss)', background: 'var(--loss-bg)', padding: '3px 8px', borderRadius: 4 }}>Cloud error</span>}
          {uploadStatus === 'success' && !syncStatus && <span style={{ fontSize: 11, color: 'var(--gain)', background: 'var(--gain-bg)', padding: '3px 8px', borderRadius: 4, fontFamily: 'var(--font-mono)' }}>✓ XML loaded</span>}
          {uploadStatus === 'empty' && <span style={{ fontSize: 11, color: '#D97706', background: '#FFF7ED', padding: '3px 8px', borderRadius: 4 }}>No positions found</span>}
          {uploadStatus === 'error' && <span style={{ fontSize: 11, color: 'var(--loss)', background: 'var(--loss-bg)', padding: '3px 8px', borderRadius: 4 }}>Parse error</span>}

          {!isViewOnly && <>
            {ibkrLive ? (
              <button onClick={disconnectIBKR} style={{ padding: '7px 14px', background: 'transparent', color: 'var(--loss)', border: '1px solid var(--loss)', borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'var(--font-body)' }}>
                Disconnect Live
              </button>
            ) : (
              <button onClick={() => setShowIBKR(true)} style={{ padding: '7px 14px', background: '#EBF8F2', color: 'var(--gain)', border: '1px solid #6EE7B7', borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'var(--font-body)', display: 'flex', alignItems: 'center', gap: 5 }}>
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" strokeWidth="1.5"/><circle cx="8" cy="8" r="2.5" fill="currentColor"/></svg>
                Connect Live
              </button>
            )}
            {!firebaseReady && (
              <button onClick={() => setShowSetup(true)} style={{ padding: '7px 14px', background: 'transparent', color: 'var(--text-secondary)', border: '1px solid var(--border)', borderRadius: 7, fontSize: 12, fontWeight: 500, cursor: 'pointer', fontFamily: 'var(--font-body)' }}>
                Enable Cloud Sync
              </button>
            )}
            {firebaseReady && (
              <button onClick={() => setShowShare(true)} style={{ padding: '7px 14px', background: 'transparent', color: tweaks.accentColor, border: `1px solid ${tweaks.accentColor}`, borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'var(--font-body)', display: 'flex', alignItems: 'center', gap: 5 }}>
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="12" cy="3" r="1.5" stroke="currentColor" strokeWidth="1.5"/><circle cx="4" cy="8" r="1.5" stroke="currentColor" strokeWidth="1.5"/><circle cx="12" cy="13" r="1.5" stroke="currentColor" strokeWidth="1.5"/><path d="M5.5 7l5-3M5.5 9l5 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
                Share
              </button>
            )}
            <input ref={fileRef} type="file" accept=".xml" style={{ display: 'none' }} onChange={handleFile} />
            <button onClick={() => fileRef.current.click()} style={{ padding: '7px 14px', background: tweaks.accentColor, color: 'white', border: 'none', borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, fontFamily: 'var(--font-body)' }}>
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4 6l4-5 4 5M2 12v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Import XML
            </button>
          </>}
        </div>
      </header>

      <main style={{ padding: 28 }}>
        {(activeTab === 'overview' || isViewOnly) && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

            {/* Metric Cards */}
            <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap' }}>
              <MetricCard
                label="Portfolio Value"
                value={fmt(metrics.totalVal)}
                sub={tweaks.showCash ? `Incl. ${fmt(cash)} cash` : `Equity only`}
              />
              <MetricCard
                label="Unrealized P&L"
                value={fmtDelta(metrics.unrealizedPnL)}
                sub={fmtPct(metrics.unrealizedPct) + ' vs cost basis'}
                accent={metrics.unrealizedPnL >= 0 ? tweaks.gainColor : tweaks.lossColor}
                subColor={metrics.unrealizedPnL >= 0 ? tweaks.gainColor : tweaks.lossColor}
              />
              {ibkrDayPnL !== null && (
                <MetricCard
                  label="Day P&L (Live)"
                  value={fmtDelta(ibkrDayPnL)}
                  sub="From IBKR gateway"
                  accent={ibkrDayPnL >= 0 ? tweaks.gainColor : tweaks.lossColor}
                  subColor={ibkrDayPnL >= 0 ? tweaks.gainColor : tweaks.lossColor}
                />
              )}
              {tweaks.showCash && (
                <MetricCard
                  label="Cash Balance"
                  value={fmt(cash)}
                  sub={`${((cash / metrics.totalVal) * 100).toFixed(1)}% of portfolio`}
                />
              )}
            </div>

            {/* Chart */}
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '20px 20px 14px', boxShadow: 'var(--shadow-sm)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
                <div>
                  <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-tertiary)', fontWeight: 600, marginBottom: 4 }}>90-Day Performance</div>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 24 }}>{fmt(hist[hist.length - 1].value)}</div>
                </div>
                <span style={{ fontSize: 13, fontFamily: 'var(--font-mono)', fontWeight: 600, color: hist[hist.length-1].value >= hist[0].value ? 'var(--gain)' : 'var(--loss)', background: hist[hist.length-1].value >= hist[0].value ? 'var(--gain-bg)' : 'var(--loss-bg)', padding: '3px 8px', borderRadius: 4, marginTop: 4 }}>
                  {fmtPct((hist[hist.length-1].value - hist[0].value) / hist[0].value * 100)}
                </span>
              </div>
              <LineChart data={hist} />
            </div>

            {/* Positions row */}
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
              <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)' }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>Open Positions <span style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--text-tertiary)', fontWeight: 400, marginLeft: 6 }}>{positions.length} holdings</span></div>
              </div>
              <PositionsTable positions={positions} compact={tweaks.compactTable} />
            </div>
          </div>
        )}

        {!isViewOnly && activeTab === 'positions' && (
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
            <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)' }}><div style={{ fontSize: 13, fontWeight: 600 }}>All Positions</div></div>
            <PositionsTable positions={positions} compact={tweaks.compactTable} />
          </div>
        )}

        {!isViewOnly && activeTab === 'pnl' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '20px', boxShadow: 'var(--shadow-sm)' }}>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-tertiary)', fontWeight: 600, marginBottom: 20 }}>Unrealized P&amp;L by Position</div>
              <BarChart positions={positions} />
            </div>
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
              <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)' }}><div style={{ fontSize: 13, fontWeight: 600 }}>P&amp;L Detail</div></div>
              <PositionsTable positions={positions} compact={tweaks.compactTable} />
            </div>
          </div>
        )}
      </main>

      {!isViewOnly && (
        <div style={{ padding: '0 28px 28px' }}>
          <div style={{ background: '#FFFBEB', border: '1px solid #FDE68A', borderRadius: 'var(--radius)', padding: '14px 18px', fontSize: 12, color: '#92400E', lineHeight: 1.7 }}>
            <strong>IBKR Flex XML export:</strong> Performance &amp; Reports → Flex Queries → Create Query → select <em>Open Positions</em> + <em>Net Asset Value (NAV) in Base</em> → Format: XML → Run → Download → Import above.
            {' '}<strong>For real-time:</strong> use Connect Live (requires IBKR Client Portal Gateway running locally).
          </div>
        </div>
      )}

      {showTweaks && (
        <div style={{ position: 'fixed', bottom: 24, right: 24, background: 'white', border: '1px solid var(--border)', borderRadius: 12, padding: 20, boxShadow: '0 8px 32px rgba(0,0,0,0.12)', zIndex: 100, width: 260 }}>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-tertiary)', marginBottom: 16 }}>Tweaks</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {['accentColor','gainColor','lossColor'].map(k => (
              <label key={k} style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                <span style={{ fontSize: 11, color: 'var(--text-secondary)', fontWeight: 500 }}>{k === 'accentColor' ? 'Accent' : k === 'gainColor' ? 'Gain Color' : 'Loss Color'}</span>
                <input type="color" value={tweaks[k]} onChange={e => updateTweak(k, e.target.value)} style={{ width: '100%', height: 32, border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }} />
              </label>
            ))}
            <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span style={{ fontSize: 11, color: 'var(--text-secondary)', fontWeight: 500 }}>Show Cash</span>
              <input type="checkbox" checked={tweaks.showCash} onChange={e => updateTweak('showCash', e.target.checked)} style={{ width: 16, height: 16, cursor: 'pointer' }} />
            </label>
            <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span style={{ fontSize: 11, color: 'var(--text-secondary)', fontWeight: 500 }}>Compact Table</span>
              <input type="checkbox" checked={tweaks.compactTable} onChange={e => updateTweak('compactTable', e.target.checked)} style={{ width: 16, height: 16, cursor: 'pointer' }} />
            </label>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
