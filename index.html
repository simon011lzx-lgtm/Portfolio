async function saveToCloud(portfolioId, data) {
  const db = getDb(); if (!db) return;
  const history = (data.history || []).map(h => ({
    date: h.date instanceof Date ? h.date.toISOString() : h.date,
    value: h.value
  }));
  const payload = {
    positions: data.positions,
    history,
    cash: data.cash,
    realized: data.realized || [],
    summary: data.summary || null,
    updatedAt: new Date().toISOString()
  };
  try {
    const res = await db.collection('portfolio').where({ portfolioId }).get();
    if (res.data && res.data.length > 0) {
      await db.collection('portfolio').doc(res.data[0]._id).update(payload);
    } else {
      await db.collection('portfolio').add({ portfolioId, ...payload });
    }
  } catch(e) { console.error('CloudBase save error:', e); }
}

async function loadFromCloud(portfolioId) {
  const db = getDb(); if (!db) return null;
  try {
    const res = await db.collection('portfolio').where({ portfolioId }).get();
    if (!res.data || res.data.length === 0) return null;
    const d = res.data[0];
    return {
      positions: d.positions || [],
      history: (d.history || []).map(h => ({ ...h, date: new Date(h.date) })),
      cash: d.cash || 0,
      realized: d.realized || [],
      summary: d.summary || null,
    };
  } catch(e) { console.error('CloudBase load error:', e); return null; }
}

async function ibkrFetch(base, path, opts = {}) {
  const url = base.replace(/\/$/, '') + path;
  const res = await fetch(url, { ...opts, credentials: 'include' });
  if (!res.ok) throw new Error(`IBKR ${res.status}: ${res.statusText}`);
  return res.json();
}

async function ibkrGetAccounts(base) {
  return ibkrFetch(base, '/portfolio/accounts');
}

async function ibkrGetPositions(base, accountId) {
  // IBKR returns pages; grab first page (up to 30 positions)
  const page0 = await ibkrFetch(base, `/portfolio/${accountId}/positions/0`);

}

function genHistory(positions, cash) {
  const today = new Date();
  const days = [];
  let base = positions.reduce((s, p) => s + p.qty * p.cost, 0) + cash;
  for (let i = 89; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    if (d.getDay() === 0 || d.getDay() === 6) continue;
    const noise = (Math.random() - 0.42) * base * 0.012;
    base = Math.max(base + noise, base * 0.85);
    days.push({ date: d, value: Math.round(base * 100) / 100 });
  }
  const curVal = positions.reduce((s, p) => s + p.qty * p.mark, 0) + cash;
  days[days.length - 1].value = curVal;
  return days;
}

function parseFlexXML(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'text/xml');
  const positions = [];
  doc.querySelectorAll('OpenPosition').forEach(p => {
    const symbol = p.getAttribute('symbol');
    const qty = parseFloat(p.getAttribute('position') || '0');
    const mark = parseFloat(p.getAttribute('markPrice') || '0');
    const cost = parseFloat(p.getAttribute('costBasisPrice') || '0');
    const assetCategory = p.getAttribute('assetCategory');
    if (symbol && qty !== 0 && (assetCategory === 'STK' || assetCategory === 'OPT'))
      positions.push({ symbol, desc: p.getAttribute('description') || symbol, sector: assetCategory === 'OPT' ? 'Options' : 'Unknown', qty, cost, mark, currency: 'USD', assetType: assetCategory });
  });
  const equitySummary = [];
  doc.querySelectorAll('NetAssetValueInBase, NAVInBase').forEach(e => {
    const d = e.getAttribute('reportDate') || e.getAttribute('date');
    const v = parseFloat(e.getAttribute('total') || e.getAttribute('nav') || '0');
    if (d && v) equitySummary.push({ date: new Date(d), value: v });
  });
  if (!equitySummary.length) {
    doc.querySelectorAll('EquitySummaryByReportDateInBase').forEach(e => {
      const d = e.getAttribute('reportDate');
      const v = parseFloat(e.getAttribute('total') || '0');
      if (d && v) equitySummary.push({ date: new Date(d), value: v });
    });
  }
  equitySummary.sort((a, b) => a.date - b.date);
  // Read cash from NAV element (most accurate — cash component of total NAV)
  let cash = null;
  const navEls = doc.querySelectorAll('NetAssetValueInBase, NAVInBase');
  if (navEls.length) {
    const last = navEls[navEls.length - 1];
    const c = parseFloat(last.getAttribute('cash') || '0');
    if (c !== 0) cash = c;
  }
  if (cash === null) {
    const lastEq = doc.querySelectorAll('EquitySummaryByReportDateInBase');
    if (lastEq.length) {
      const c = parseFloat(lastEq[lastEq.length - 1].getAttribute('cash') || '0');
      if (c !== 0) cash = c;
    }
  }
  if (cash === null) {
    doc.querySelectorAll('CashReportCurrency').forEach(c => {
      const isBase = c.getAttribute('isBase') === 'Y' || c.getAttribute('isBase') === '1';
      const ending = parseFloat(c.getAttribute('endingCash') || c.getAttribute('endingSettledCash') || '0');
      if ((c.getAttribute('currency') === 'USD' || isBase) && ending !== 0) cash = ending;
    });
  }
  // Realized P&L per symbol from FIFO Performance Summary
  const realized = [];
  doc.querySelectorAll('FIFOPerformanceSummaryUnderlying').forEach(e => {
    const symbol = e.getAttribute('symbol');
    const desc = e.getAttribute('description') || symbol;
    const assetCategory = e.getAttribute('assetCategory') || '';
    const realizedPnl = parseFloat(e.getAttribute('totalRealizedPnl') || '0');
    const unrealizedPnl = parseFloat(e.getAttribute('totalUnrealizedPnl') || '0');
    if (symbol && (realizedPnl !== 0 || unrealizedPnl !== 0)) {
      realized.push({ symbol, desc, assetType: assetCategory, realizedPnl, unrealizedPnl, totalPnl: realizedPnl + unrealizedPnl });
    }
  });
  realized.sort((a, b) => b.realizedPnl - a.realizedPnl);
  // Account summary from CashReport (BASE_SUMMARY row)
  let summary = null;
  const baseRow = Array.from(doc.querySelectorAll('CashReportCurrency')).find(c => c.getAttribute('currency') === 'BASE_SUMMARY') ||
                  Array.from(doc.querySelectorAll('CashReportCurrency')).find(c => c.getAttribute('currency') === 'USD');
  if (baseRow) {
    summary = {
      deposits: parseFloat(baseRow.getAttribute('deposits') || '0'),
      withdrawals: parseFloat(baseRow.getAttribute('withdrawals') || '0'),
      commissions: parseFloat(baseRow.getAttribute('commissions') || '0'),
      dividends: parseFloat(baseRow.getAttribute('dividends') || '0'),
      withholdingTax: parseFloat(baseRow.getAttribute('withholdingTax') || '0'),
      brokerInterest: parseFloat(baseRow.getAttribute('brokerInterest') || '0'),
      fromDate: baseRow.getAttribute('fromDate') || '',
      toDate: baseRow.getAttribute('toDate') || ''
    };
  }
  return { positions: positions.length ? positions : null, history: equitySummary.length ? equitySummary : null, cash, realized, summary };
}

// ─── DONUT CHART ─────────────────────────────────────────────────────────────
function DonutChart({ positions }) {
  const [hovered, setHovered] = useState(null);
  const sectorMap = {};
  positions.forEach(p => {
    const s = p.sector || 'Unknown';
    sectorMap[s] = (sectorMap[s] || 0) + p.mark * p.qty;
  });
  const total = Object.values(sectorMap).reduce((a, b) => a + b, 0);
  const sectors = Object.entries(sectorMap).sort((a, b) => b[1] - a[1]);
  const CX = 90, CY = 90, R = 72, INNER = 44;
  let angle = -Math.PI / 2;
  const slices = sectors.map(([name, val]) => {
    const pct = val / total;
    const start = angle;
    angle += pct * 2 * Math.PI;
    const end = angle;
    const x1 = CX + R * Math.cos(start), y1 = CY + R * Math.sin(start);
    const x2 = CX + R * Math.cos(end), y2 = CY + R * Math.sin(end);
    const xi1 = CX + INNER * Math.cos(start), yi1 = CY + INNER * Math.sin(start);
    const xi2 = CX + INNER * Math.cos(end), yi2 = CY + INNER * Math.sin(end);
    const large = pct > 0.5 ? 1 : 0;
    const path = `M ${xi1} ${yi1} L ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${INNER} ${INNER} 0 ${large} 0 ${xi1} ${yi1} Z`;
    return { name, val, pct, path, color: SECTOR_COLORS[name] || '#9CA3AF' };
  });

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 24, flexWrap: 'wrap' }}>
      <svg viewBox="0 0 180 180" style={{ width: 150, flexShrink: 0 }}>
        {slices.map(s => (
          <path key={s.name} d={s.path} fill={s.color}
            opacity={hovered && hovered !== s.name ? 0.3 : 1}
            style={{ cursor: 'pointer', transition: 'opacity 0.15s' }}
            onMouseEnter={() => setHovered(s.name)} onMouseLeave={() => setHovered(null)} />
        ))}
        <text x={CX} y={CY - 8} textAnchor="middle" fontSize="9" fill="#9C9A94" fontFamily="DM Sans">EQUITY</text>
        <text x={CX} y={CY + 8} textAnchor="middle" fontSize="13" fontWeight="600" fill="#141413" fontFamily="DM Mono">{fmt(total)}</text>
      </svg>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 7, flex: 1, minWidth: 160 }}>
        {slices.map(s => (
          <div key={s.name} style={{ display: 'flex', alignItems: 'center', gap: 8, opacity: hovered && hovered !== s.name ? 0.3 : 1, transition: 'opacity 0.15s', cursor: 'default' }}
            onMouseEnter={() => setHovered(s.name)} onMouseLeave={() => setHovered(null)}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: s.color, flexShrink: 0 }} />
            <span style={{ fontSize: 12, flex: 1, color: 'var(--text-secondary)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{s.name}</span>
            <span style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--text-primary)', flexShrink: 0 }}>{(s.pct * 100).toFixed(1)}%</span>
            <span style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--text-tertiary)', flexShrink: 0, minWidth: 60, textAlign: 'right' }}>{fmt(s.val)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── LINE CHART ──────────────────────────────────────────────────────────────
function LineChart({ data }) {
  const [hover, setHover] = useState(null);
  const svgRef = useRef(null);
  const W = 600, H = 200, PAD = { t: 16, r: 16, b: 32, l: 64 };
  const cW = W - PAD.l - PAD.r, cH = H - PAD.t - PAD.b;
  const vals = data.map(d => d.value);
  const minV = Math.min(...vals) * 0.995, maxV = Math.max(...vals) * 1.005;
  const xScale = i => (i / (data.length - 1)) * cW;
  const yScale = v => cH - ((v - minV) / (maxV - minV)) * cH;
  const linePath = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xScale(i).toFixed(1)} ${yScale(d.value).toFixed(1)}`).join(' ');
  const areaPath = linePath + ` L ${xScale(data.length-1).toFixed(1)} ${cH} L 0 ${cH} Z`;
  const xLabels = [0, Math.floor(data.length * 0.25), Math.floor(data.length * 0.5), Math.floor(data.length * 0.75), data.length - 1];
  const lineColor = data[data.length-1].value >= data[0].value ? '#1A9E6A' : '#D94F3A';
  const handleMouseMove = e => {
    const rect = svgRef.current.getBoundingClientRect();
    const x = (e.clientX - rect.left - PAD.l) * (W / rect.width);
    const idx = Math.max(0, Math.min(data.length - 1, Math.round((x / cW) * (data.length - 1))));
    setHover({ idx, x: xScale(idx), y: yScale(data[idx].value), d: data[idx] });
  };
  return (
    <div style={{ position: 'relative' }}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block', cursor: 'crosshair' }} onMouseMove={handleMouseMove} onMouseLeave={() => setHover(null)}>
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={lineColor} stopOpacity="0.15" />
            <stop offset="100%" stopColor={lineColor} stopOpacity="0" />
          </linearGradient>
        </defs>
        <g transform={`translate(${PAD.l},${PAD.t})`}>
          {[0, 0.25, 0.5, 0.75, 1].map(f => {
            const v = minV + f * (maxV - minV), y = yScale(v);
            return <g key={f}><line x1={0} y1={y} x2={cW} y2={y} stroke="#E8E6E0" strokeWidth="1" /><text x={-6} y={y+4} textAnchor="end" fontSize="10" fill="#9C9A94" fontFamily="DM Mono">{fmt(v)}</text></g>;
          })}
          <path d={areaPath} fill="url(#areaGrad)" />
          <path d={linePath} fill="none" stroke={lineColor} strokeWidth="2" strokeLinejoin="round" />
          {xLabels.map(i => <text key={i} x={xScale(i)} y={cH+20} textAnchor="middle" fontSize="10" fill="#9C9A94" fontFamily="DM Mono">{data[i]?.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</text>)}
          {hover && <><line x1={hover.x} y1={0} x2={hover.x} y2={cH} stroke="#D4D0C8" strokeWidth="1" strokeDasharray="3,3" /><circle cx={hover.x} cy={hover.y} r={4} fill={lineColor} stroke="white" strokeWidth="2" /></>}
        </g>
      </svg>
      {hover && (
        <div style={{ position: 'absolute', top: 8, left: Math.min(hover.x / 600 * 100, 65) + '%', background: 'var(--text-primary)', color: 'white', borderRadius: 6, padding: '6px 10px', fontSize: 12, fontFamily: 'var(--font-mono)', pointerEvents: 'none', whiteSpace: 'nowrap' }}>
          <div style={{ opacity: 0.6, fontSize: 10 }}>{hover.d.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
          <div style={{ fontWeight: 500, fontSize: 14 }}>{fmt(hover.d.value)}</div>
        </div>
      )}
    </div>
  );
}

// ─── BAR CHART ───────────────────────────────────────────────────────────────
function BarChart({ positions }) {
  const sorted = [...positions].sort((a, b) => (b.mark - b.cost) * b.qty - (a.mark - a.cost) * a.qty);
  const pnls = sorted.map(p => (p.mark - p.cost) * p.qty);
  const maxAbs = Math.max(...pnls.map(Math.abs));
  const W = 600, BAR_H = 26, GAP = 6, PAD_L = 52, PAD_R = 80;
  const H = sorted.length * (BAR_H + GAP) + 8;
  const zero = PAD_L + (W - PAD_L - PAD_R) / 2;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', display: 'block' }}>
      {sorted.map((pos, i) => {
        const pnl = pnls[i], pct = (pos.mark - pos.cost) / pos.cost * 100;
        const barW = Math.abs(pnl) / maxAbs * ((W - PAD_L - PAD_R) / 2 - 4);
        const x = pnl >= 0 ? zero : zero - barW, y = i * (BAR_H + GAP);
        const color = pnl >= 0 ? '#1A9E6A' : '#D94F3A';
        return <g key={pos.symbol}>
          <text x={PAD_L - 6} y={y + BAR_H/2 + 4} textAnchor="end" fontSize="11" fontFamily="DM Mono" fontWeight="500" fill="#141413">{pos.symbol}</text>
          <rect x={zero - (W - PAD_L - PAD_R)/2} y={y} width={W - PAD_L - PAD_R} height={BAR_H} fill="#F7F7F5" rx="3" />
          <rect x={x} y={y} width={Math.max(barW, 2)} height={BAR_H} fill={color} rx="3" opacity="0.85" />
          <text x={zero + (W - PAD_L - PAD_R)/2 + 6} y={y + BAR_H/2 + 4} fontSize="10" fontFamily="DM Mono" fill={color} fontWeight="500">{pnl >= 0 ? '+' : ''}{fmt(pnl)}</text>
          <text x={zero + (W - PAD_L - PAD_R)/2 + 6} y={y + BAR_H/2 + 14} fontSize="9" fontFamily="DM Mono" fill="#9C9A94">{fmtPct(pct)}</text>
        </g>;
      })}
      <line x1={zero} y1={0} x2={zero} y2={H} stroke="#D4D0C8" strokeWidth="1" />
    </svg>
  );
}

    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');
    const channelTitle = doc.querySelector('channel > title')?.textContent || sourceName;
    return Array.from(doc.querySelectorAll('item')).slice(0, 5).map(item => ({
      title: item.querySelector('title')?.textContent?.replace('<![CDATA[','').replace(']]>','') || '',
      link: item.querySelector('link')?.textContent || '',
      pubDate: item.querySelector('pubDate')?.textContent || '',
      source: channelTitle,
    }));
  };

  const fetchRSS = async (url) => {
    const proxy = 'https://api.codetabs.com/v1/proxy?quest=';
    const res = await fetch(proxy + encodeURIComponent(url));
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    return parseRSS(text, '');
  };

  useEffect(() => {
    let cancelled = false;
    const load = async () => {
      setLoading(true);
      setError('');

  const NewsCard = ({ item }) => (

    }).join('\n');
    const rlLines = realized.length
      ? realized.map(r => `• ${r.symbol}: 已实现$${r.realizedPnl.toFixed(2)}, 未实现$${r.unrealizedPnl.toFixed(2)}`).join('\n')
      : '暂无数据';
    return `你是用户的私人投资组合助手，数据来自 Interactive Brokers。请用简洁中文回答。

账户概况
- 投资组合总值: $${metrics.totalVal.toFixed(2)}
- 现金余额: $${cash.toFixed(2)}
- 未实现盈亏: $${metrics.unrealizedPnL.toFixed(2)} (${(metrics.unrealizedPct * 100).toFixed(2)}%)

持仓明细
${posLines}

已实现盈亏（今年, FIFO数据）
${rlLines}

请基于以上真实数据回答问题。数据中没有的信息请直接说明，不要捏造。`;
  };

  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role: 'user', content: input.trim() };
    const history = [...messages, userMsg];
    setMessages(history);
    setInput('');
    setLoading(true);
    try {
      const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_KEY}` },
        body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'system', content: buildSystem() }, ...history], max_tokens: 1024 }),
      });
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || '未能获取回复，请重试。';
      setMessages(prev => [...prev, { role: 'assistant', content: reply }]);
    } catch {
      setMessages(prev => [...prev, { role: 'assistant', content: '网络错误，请检查连接后重试。' }]);
    }
    setLoading(false);
  };

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, loading]);

  const SUGGESTED = ['我的持仓情况如何？', '哪个股票盈利最多？', '帮我分析风险敞口'];

  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 300, display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 12 }}>
      {open && (
        <div style={{ width: 360, height: 500, background: 'white', borderRadius: 16, boxShadow: '0 20px 60px rgba(0,0,0,0.18)', border: '1px solid var(--border)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          <div style={{ padding: '14px 16px', background: 'var(--accent)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18 }}>🤖</span>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: 'white' }}>AI 投资助手</div>
                <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.75)' }}>DeepSeek · 基于你的真实持仓</div>
              </div>
            </div>
            <button onClick={() => setOpen(false)} style={{ background: 'none', border: 'none', color: 'white', fontSize: 20, cursor: 'pointer', lineHeight: 1, opacity: 0.8 }}>×</button>
          </div>
          <div style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
            {messages.length === 0 && (
              <div style={{ color: 'var(--text-tertiary)', fontSize: 13, textAlign: 'center', padding: '16px 8px' }}>
                <div style={{ fontSize: 28, marginBottom: 8 }}>💬</div>
                <div style={{ fontWeight: 500, color: 'var(--text-secondary)', marginBottom: 4 }}>你好！</div>
                <div style={{ lineHeight: 1.6, marginBottom: 14 }}>我已了解你的持仓，可以问我任何关于你投资组合的问题。</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {SUGGESTED.map(q => (
                    <button key={q} onClick={() => setInput(q)} style={{ background: 'var(--accent-light)', color: 'var(--accent)', border: '1px solid var(--accent)', borderRadius: 20, padding: '5px 12px', fontSize: 12, cursor: 'pointer', fontFamily: 'var(--font-body)' }}>{q}</button>
                  ))}
                </div>
              </div>
            )}
            {messages.map((m, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start' }}>
                <div style={{ maxWidth: '83%', padding: '9px 13px', borderRadius: m.role === 'user' ? '14px 14px 3px 14px' : '14px 14px 14px 3px', background: m.role === 'user' ? 'var(--accent)' : 'var(--bg)', color: m.role === 'user' ? 'white' : 'var(--text-primary)', fontSize: 13, lineHeight: 1.65, border: m.role === 'assistant' ? '1px solid var(--border)' : 'none', whiteSpace: 'pre-wrap' }}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading && (
              <div style={{ display: 'flex', justifyContent: 'flex-start' }}>
                <div style={{ padding: '9px 13px', background: 'var(--bg)', borderRadius: '14px 14px 14px 3px', border: '1px solid var(--border)', fontSize: 13, color: 'var(--text-tertiary)' }}>思考中…</div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>
          <div style={{ padding: '10px 12px', borderTop: '1px solid var(--border)', display: 'flex', gap: 8 }}>
            <input
              value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && !e.shiftKey && send()}
              placeholder="输入问题，回车发送…"
              style={{ flex: 1, border: '1px solid var(--border)', borderRadius: 8, padding: '8px 12px', fontSize: 13, outline: 'none', fontFamily: 'var(--font-body)' }}
            />
            <button onClick={send} disabled={loading || !input.trim()} style={{ padding: '8px 14px', background: 'var(--accent)', color: 'white', border: 'none', borderRadius: 8, cursor: loading || !input.trim() ? 'not-allowed' : 'pointer', fontSize: 13, fontWeight: 600, opacity: loading || !input.trim() ? 0.5 : 1, fontFamily: 'var(--font-body)' }}>发送</button>
          </div>
        </div>
      )}
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }}>
        <button onClick={() => setOpen(o => !o)} title="AI 投资助手" style={{ width: 62, height: 62, borderRadius: '50%', background: open ? '#1e40af' : 'var(--accent)', color: 'white', border: '3px solid rgba(255,255,255,0.35)', cursor: 'pointer', boxShadow: '0 6px 24px rgba(37,99,235,0.55)', fontSize: open ? 24 : 28, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.2s' }}>
          {open ? '×' : '🤖'}
        </button>
        {!open && <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--accent)', background: 'white', border: '1px solid var(--border)', borderRadius: 20, padding: '2px 8px', boxShadow: '0 2px 8px rgba(0,0,0,0.08)', whiteSpace: 'nowrap', letterSpacing: '0.02em' }}>AI 投资助手</div>}
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [positions, setPositions] = useState(SAMPLE_POSITIONS);
  const [history, setHistory] = useState(null);
  const [cash, setCash] = useState(DEFAULT_CASH);
  const [realized, setRealized] = useState([]);
  const [accountSummary, setAccountSummary] = useState(null);
  const [uploadStatus, setUploadStatus] = useState(null);
  const [activeTab, setActiveTab] = useState('overview');
  const [showShare, setShowShare] = useState(false);
  const [showIBKR, setShowIBKR] = useState(false);
  const [cloudReady, setCloudReady] = useState(false);
  const [portfolioId, setPortfolioId] = useState('');
  const [syncStatus, setSyncStatus] = useState(null);
  const [isViewOnly, setIsViewOnly] = useState(false);
  // IBKR live state
  const [ibkrLive, setIbkrLive] = useState(false);
  const [ibkrBase, setIbkrBase] = useState('');
  const [ibkrAccount, setIbkrAccount] = useState('');
  const [ibkrAccounts, setIbkrAccounts] = useState([]);
  const [ibkrDayPnL, setIbkrDayPnL] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [ibkrError, setIbkrError] = useState('');
  const refreshTimer = useRef(null);
  const fileRef = useRef(null);

  const hist = useMemo(() => history || genHistory(positions, cash), [positions, history, cash]);

  const metrics = useMemo(() => {
    const totalEquity = positions.reduce((s, p) => s + p.mark * p.qty, 0);
    const totalCost = positions.reduce((s, p) => s + p.cost * p.qty, 0);
    const unrealizedPnL = totalEquity - totalCost;
    const unrealizedPct = totalCost > 0 ? unrealizedPnL / totalCost * 100 : 0;
    const totalVal = totalEquity + (tweaks.showCash ? cash : 0);
    return { totalVal, totalEquity, unrealizedPnL, unrealizedPct };
  }, [positions, cash, tweaks.showCash]);

  // On mount: check URL params, init CloudBase, load data
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const dataParam = params.get('data');
    if (dataParam) {
      setIsViewOnly(true);
      setSyncStatus('synced');
      try {
        const decoded = JSON.parse(LZString.decompressFromEncodedURIComponent(dataParam));
        if (decoded.positions) setPositions(decoded.positions);
        if (decoded.cash != null) setCash(decoded.cash);
        if (decoded.realized?.length) setRealized(decoded.realized);
        if (decoded.history?.length) setHistory(decoded.history);
        if (decoded.summary) setAccountSummary(decoded.summary);
      } catch(e) { setSyncStatus('error'); }
      return;
    }
    const sharedId = params.get('id');
    const targetId = sharedId || localStorage.getItem('portfolio_id') || genPortfolioId();
    if (sharedId) setIsViewOnly(true);
    else { localStorage.setItem('portfolio_id', targetId); }
    setPortfolioId(targetId);
    setSyncStatus('syncing');
    // Init CloudBase then load
    (async () => {
      try {
        const ok = await initCloudBase();
        if (!ok) { setSyncStatus('error'); return; }
        setCloudReady(true);
        const data = await loadFromCloud(targetId);
        if (data) {
          setPositions(data.positions);
          if (data.history?.length) setHistory(data.history);
          setCash(data.cash || DEFAULT_CASH);
          setRealized(data.realized || []);
          setAccountSummary(data.summary || null);
          setSyncStatus('synced');
        } else {
          setSyncStatus(sharedId ? 'error' : null);
        }
      } catch(e) {
        console.error('[CloudBase] mount error:', e);
        setSyncStatus('error');
      }
    })();
  }, []);

  // Tweaks messaging
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // IBKR auto-refresh every 30s
  const fetchIBKRData = useCallback(async (base, accountId) => {
    try {
      setIbkrError('');
      const [rawPositions, summary] = await Promise.all([
        ibkrGetPositions(base, accountId),
        ibkrGetSummary(base, accountId).catch(() => null),
      ]);
      // Keep session alive
      ibkrTickle(base);
      const mapped = ibkrPositionsToApp(rawPositions);
      if (mapped.length) setPositions(mapped);
      if (summary) {
        const cashVal = summary.totalcashvalue?.amount ?? summary.totalcashvalue?.USD ?? null;
        if (cashVal != null) setCash(cashVal);
        const dayPnl = summary.dailypnl?.amount ?? summary.dailypnl?.USD ?? null;
        setIbkrDayPnL(dayPnl);
      }
      setLastUpdated(new Date());
    } catch(e) {
      setIbkrError('Refresh failed: ' + (e.message || 'unknown error'));
    }
  }, []);

  useEffect(() => {
    if (!ibkrLive || !ibkrBase || !ibkrAccount) return;
    fetchIBKRData(ibkrBase, ibkrAccount);
    refreshTimer.current = setInterval(() => fetchIBKRData(ibkrBase, ibkrAccount), 30000);
    return () => clearInterval(refreshTimer.current);
  }, [ibkrLive, ibkrBase, ibkrAccount, fetchIBKRData]);

  const handleIBKRConnect = (base, accountId, accounts) => {
    setIbkrBase(base);
    setIbkrAccount(accountId);
    setIbkrAccounts(accounts);
    setIbkrLive(true);
    setShowIBKR(false);
  };

  const disconnectIBKR = () => {
    setIbkrLive(false);
    setIbkrAccount('');
    setIbkrBase('');
    setIbkrDayPnL(null);
    setLastUpdated(null);
    clearInterval(refreshTimer.current);
  };

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const handleFile = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    setUploadStatus('loading');
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const { positions: parsed, history: h, cash: parsedCash, realized: parsedRealized, summary: parsedSummary } = parseFlexXML(ev.target.result);
        if (parsed?.length) {
          setPositions(parsed);
          if (h?.length) setHistory(h);
          if (parsedCash != null) setCash(parsedCash);
          setRealized(parsedRealized || []);
          setAccountSummary(parsedSummary || null);
          setUploadStatus('success');
          if (cloudReady && portfolioId) {
            setSyncStatus('syncing');
            try { await saveToCloud(portfolioId, { positions: parsed, history: h || [], cash: parsedCash || cash, realized: parsedRealized || [], summary: parsedSummary || null }); setSyncStatus('synced'); }
            catch { setSyncStatus('error'); }
          }
        } else { setUploadStatus('empty'); }
      } catch { setUploadStatus('error'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const tabs = [{ id: 'overview', label: '总览' }, { id: 'positions', label: '持仓' }, { id: 'pnl', label: '盈亏分析' }, { id: 'realized', label: '已实现盈亏' }];

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)', '--gain': tweaks.gainColor, '--loss': tweaks.lossColor, '--accent': tweaks.accentColor, '--accent-light': tweaks.accentColor + '18' }}>
      {showShare && <ShareModal portfolioId={portfolioId} onClose={() => setShowShare(false)} positions={positions} cash={cash} realized={realized} history={hist} />}
      {showIBKR && <IBKRLiveModal onConnect={handleIBKRConnect} onClose={() => setShowIBKR(false)} />}

      <header style={{ background: 'var(--surface)', borderBottom: '1px solid var(--border)', padding: '0 28px', height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, zIndex: 10, boxShadow: 'var(--shadow-sm)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
          <div>
            <span style={{ fontFamily: 'var(--font-display)', fontSize: 18, letterSpacing: '-0.01em' }}>Portfolio</span>
            <span style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 18, color: tweaks.accentColor, marginLeft: 4 }}>Tracker</span>
          </div>
          {isViewOnly && <span style={{ fontSize: 11, background: '#FFF7ED', color: '#92400E', border: '1px solid #FDE68A', padding: '3px 8px', borderRadius: 4, fontWeight: 600 }}>View Only</span>}
          {ibkrLive && (
            <span style={{ fontSize: 11, background: 'var(--gain-bg)', color: 'var(--gain)', border: '1px solid #6EE7B7', padding: '3px 8px', borderRadius: 4, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 5 }}>
              <span className="live-dot" /> IBKR Live · {ibkrAccount}
            </span>
          )}
          {!isViewOnly && <>
            <div style={{ width: 1, height: 20, background: 'var(--border-strong)' }} />
            <nav style={{ display: 'flex', gap: 2 }}>
              {tabs.map(t => <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ padding: '6px 14px', borderRadius: 6, border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 500, fontFamily: 'var(--font-body)', background: activeTab === t.id ? tweaks.accentColor + '18' : 'transparent', color: activeTab === t.id ? tweaks.accentColor : 'var(--text-secondary)', transition: 'all 0.15s' }}>{t.label}</button>)}
            </nav>
          </>}
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          {lastUpdated && <span style={{ fontSize: 11, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)' }}>↻ {lastUpdated.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}</span>}
          {ibkrError && <span style={{ fontSize: 11, color: 'var(--loss)', background: 'var(--loss-bg)', padding: '3px 8px', borderRadius: 4 }} title={ibkrError}>⚠ 实时错误</span>}
          {syncStatus === 'syncing' && <span style={{ fontSize: 11, color: '#6B6860', fontFamily: 'var(--font-mono)' }}>↑ 同步中...</span>}
          {syncStatus === 'synced' && <span style={{ fontSize: 11, color: 'var(--gain)', background: 'var(--gain-bg)', padding: '3px 8px', borderRadius: 4, fontFamily: 'var(--font-mono)' }}>✓ 已同步</span>}
          {syncStatus === 'error' && <span style={{ fontSize: 11, color: 'var(--loss)', background: 'var(--loss-bg)', padding: '3px 8px', borderRadius: 4 }}>同步失败</span>}
          {uploadStatus === 'success' && !syncStatus && <span style={{ fontSize: 11, color: 'var(--gain)', background: 'var(--gain-bg)', padding: '3px 8px', borderRadius: 4, fontFamily: 'var(--font-mono)' }}>✓ XML 已导入</span>}
          {uploadStatus === 'empty' && <span style={{ fontSize: 11, color: '#D97706', background: '#FFF7ED', padding: '3px 8px', borderRadius: 4 }}>未找到持仓数据</span>}
          {uploadStatus === 'error' && <span style={{ fontSize: 11, color: 'var(--loss)', background: 'var(--loss-bg)', padding: '3px 8px', borderRadius: 4 }}>解析失败</span>}

          {!isViewOnly && <>
            {ibkrLive ? (
              <button onClick={disconnectIBKR} style={{ padding: '7px 14px', background: 'transparent', color: 'var(--loss)', border: '1px solid var(--loss)', borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'var(--font-body)' }}>
                断开实时
              </button>
            ) : (
              <button onClick={() => setShowIBKR(true)} style={{ padding: '7px 14px', background: '#EBF8F2', color: 'var(--gain)', border: '1px solid #6EE7B7', borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'var(--font-body)', display: 'flex', alignItems: 'center', gap: 5 }}>
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" strokeWidth="1.5"/><circle cx="8" cy="8" r="2.5" fill="currentColor"/></svg>
                实时连接
              </button>
            )}
            {(
              <button onClick={() => setShowShare(true)} style={{ padding: '7px 14px', background: 'transparent', color: tweaks.accentColor, border: `1px solid ${tweaks.accentColor}`, borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'var(--font-body)', display: 'flex', alignItems: 'center', gap: 5 }}>
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="12" cy="3" r="1.5" stroke="currentColor" strokeWidth="1.5"/><circle cx="4" cy="8" r="1.5" stroke="currentColor" strokeWidth="1.5"/><circle cx="12" cy="13" r="1.5" stroke="currentColor" strokeWidth="1.5"/><path d="M5.5 7l5-3M5.5 9l5 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
                分享
              </button>
            )}
            <input ref={fileRef} type="file" accept=".xml" style={{ display: 'none' }} onChange={handleFile} />
            <button onClick={() => fileRef.current.click()} style={{ padding: '7px 14px', background: tweaks.accentColor, color: 'white', border: 'none', borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, fontFamily: 'var(--font-body)' }}>
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4 6l4-5 4 5M2 12v1a2 2 0 002 2h8a2 2 0 002-2v-1" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
              导入 XML
            </button>
          </>}
        </div>
      </header>

      <main style={{ padding: 28 }}>
        {(activeTab === 'overview' || isViewOnly) && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

            {/* Metric Cards — Top Row */}
            <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap' }}>
              <MetricCard
                label="投资组合总值"
                value={fmt(metrics.totalVal)}
                sub={tweaks.showCash ? `含 ${fmt(cash)} 现金` : `仅股票`}
              />
              <MetricCard
                label="未实现盈亏"
                value={fmtDelta(metrics.unrealizedPnL)}
                sub={fmtPct(metrics.unrealizedPct) + ' vs cost basis'}
                accent={metrics.unrealizedPnL >= 0 ? tweaks.gainColor : tweaks.lossColor}
                subColor={metrics.unrealizedPnL >= 0 ? tweaks.gainColor : tweaks.lossColor}
              />
              {(() => {
                const realizedTotal = realized.reduce((s, r) => s + (r.realizedPnl || 0), 0);
                if (realized.length === 0) return null;
                return (
                  <MetricCard
                    label="已实现盈亏(今年)"
                    value={fmtDelta(realizedTotal)}
                    sub={`${realized.length} 个已平仓`}
                    accent={realizedTotal >= 0 ? tweaks.gainColor : tweaks.lossColor}
                    subColor={realizedTotal >= 0 ? tweaks.gainColor : tweaks.lossColor}
                  />
                );
              })()}
              {accountSummary && accountSummary.deposits > 0 && (() => {
                const netDep = accountSummary.deposits - Math.abs(accountSummary.withdrawals);
                const totalReturn = metrics.totalVal - netDep;
                const totalReturnPct = netDep > 0 ? (totalReturn / netDep) * 100 : 0;
                return (
                  <MetricCard
                    label="总回报"
                    value={fmtDelta(totalReturn)}
                    sub={`${fmtPct(totalReturnPct)}，存入 ${fmt(netDep)}`}
                    accent={totalReturn >= 0 ? tweaks.gainColor : tweaks.lossColor}
                    subColor={totalReturn >= 0 ? tweaks.gainColor : tweaks.lossColor}
                  />
                );
              })()}
              {ibkrDayPnL !== null && (
                <MetricCard
                  label="当日盈亏(实时)"
                  value={fmtDelta(ibkrDayPnL)}
                  sub="来自 IBKR Gateway"
                  accent={ibkrDayPnL >= 0 ? tweaks.gainColor : tweaks.lossColor}
                  subColor={ibkrDayPnL >= 0 ? tweaks.gainColor : tweaks.lossColor}
                />
              )}
              {tweaks.showCash && (
                <MetricCard
                  label="现金余额"
                  value={fmt(cash)}
                  sub={`占投资组合 ${((cash / metrics.totalVal) * 100).toFixed(1)}%`}
                />
              )}
            </div>

            {/* Account Summary Strip */}
            {accountSummary && (
              <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '16px 20px', boxShadow: 'var(--shadow-sm)', display: 'flex', gap: 32, flexWrap: 'wrap' }}>
                <div>
                  <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-tertiary)', fontWeight: 600, marginBottom: 4 }}>存入资金</div>
                  <div style={{ fontSize: 16, fontWeight: 600, fontFamily: 'var(--font-mono)' }}>{fmt(accountSummary.deposits)}</div>
                </div>
                {Math.abs(accountSummary.withdrawals) > 0 && (
                  <div>
                    <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-tertiary)', fontWeight: 600, marginBottom: 4 }}>提取资金</div>
                    <div style={{ fontSize: 16, fontWeight: 600, fontFamily: 'var(--font-mono)' }}>{fmt(Math.abs(accountSummary.withdrawals))}</div>
                  </div>
                )}
                <div>
                  <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-tertiary)', fontWeight: 600, marginBottom: 4 }}>股息</div>
                  <div style={{ fontSize: 16, fontWeight: 600, fontFamily: 'var(--font-mono)', color: 'var(--gain)' }}>{fmt(accountSummary.dividends)}</div>
                </div>
                <div>
                  <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-tertiary)', fontWeight: 600, marginBottom: 4 }}>手续费</div>
                  <div style={{ fontSize: 16, fontWeight: 600, fontFamily: 'var(--font-mono)', color: 'var(--loss)' }}>{fmt(Math.abs(accountSummary.commissions))}</div>
                </div>
                {Math.abs(accountSummary.withholdingTax) > 0 && (
                  <div>
                    <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-tertiary)', fontWeight: 600, marginBottom: 4 }}>预扣税</div>
                    <div style={{ fontSize: 16, fontWeight: 600, fontFamily: 'var(--font-mono)', color: 'var(--loss)' }}>{fmt(Math.abs(accountSummary.withholdingTax))}</div>
                  </div>
                )}
                {accountSummary.fromDate && accountSummary.toDate && (
                  <div style={{ marginLeft: 'auto', alignSelf: 'center' }}>
                    <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-tertiary)', fontWeight: 600 }}>统计期间</div>
                    <div style={{ fontSize: 12, fontFamily: 'var(--font-mono)', color: 'var(--text-secondary)' }}>{accountSummary.fromDate} → {accountSummary.toDate}</div>
                  </div>
                )}
              </div>
            )}

            {/* Chart */}
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '20px 20px 14px', boxShadow: 'var(--shadow-sm)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 }}>
                <div>
                  <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-tertiary)', fontWeight: 600, marginBottom: 4 }}>90天表现</div>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 24 }}>{fmt(hist[hist.length - 1].value)}</div>
                </div>
                <span style={{ fontSize: 13, fontFamily: 'var(--font-mono)', fontWeight: 600, color: hist[hist.length-1].value >= hist[0].value ? 'var(--gain)' : 'var(--loss)', background: hist[hist.length-1].value >= hist[0].value ? 'var(--gain-bg)' : 'var(--loss-bg)', padding: '3px 8px', borderRadius: 4, marginTop: 4 }}>
                  {fmtPct((hist[hist.length-1].value - hist[0].value) / hist[0].value * 100)}
                </span>
              </div>
              <LineChart data={hist} />
            </div>

            {/* Positions row */}
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
              <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)' }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>当前持仓 <span style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--text-tertiary)', fontWeight: 400, marginLeft: 6 }}>{positions.length} 只</span></div>
              </div>
              <PositionsTable positions={positions} compact={tweaks.compactTable} />
            </div>

            {React.createElement(NewsTab, { symbols: positions.map(p => p.symbol) })}
          </div>
        )}

        {!isViewOnly && activeTab === 'positions' && (
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
            <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)' }}><div style={{ fontSize: 13, fontWeight: 600 }}>全部持仓</div></div>
            <PositionsTable positions={positions} compact={tweaks.compactTable} />
          </div>
        )}

        {!isViewOnly && activeTab === 'pnl' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '20px', boxShadow: 'var(--shadow-sm)' }}>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-tertiary)', fontWeight: 600, marginBottom: 20 }}>各持仓未实现盈亏</div>
              <BarChart positions={positions} />
            </div>
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
              <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)' }}><div style={{ fontSize: 13, fontWeight: 600 }}>盈亏明细</div></div>
              <PositionsTable positions={positions} compact={tweaks.compactTable} />
            </div>
          </div>
        )}

        {!isViewOnly && activeTab === 'realized' && (
          realized.length === 0
            ? <div style={{ textAlign: 'center', padding: 60, color: 'var(--text-tertiary)', fontSize: 14 }}>暂无已实现盈亏数据，请上传包含 FIFO 绩效数据的 Flex XML。</div>
            : <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
                <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)' }}>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>已实现盈亏明细 <span style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--text-tertiary)', fontWeight: 400, marginLeft: 6 }}>{realized.length} 个股票/期权</span></div>
                </div>
                <div style={{ overflowX: 'auto' }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                    <thead>
                      <tr style={{ background: 'var(--bg)', borderBottom: '1px solid var(--border)' }}>
                        <th style={{ textAlign: 'left', padding: '10px 14px', fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>代码</th>
                        <th style={{ textAlign: 'left', padding: '10px 14px', fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>名称</th>
                        <th style={{ textAlign: 'left', padding: '10px 14px', fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>类型</th>
                        <th style={{ textAlign: 'right', padding: '10px 14px', fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>已实现</th>
                        <th style={{ textAlign: 'right', padding: '10px 14px', fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>未实现</th>
                        <th style={{ textAlign: 'right', padding: '10px 14px', fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>合计</th>
                      </tr>
                    </thead>
                    <tbody>
                      {realized.map((r, i) => (
                        <tr key={i} style={{ borderBottom: '1px solid var(--border)' }}>
                          <td style={{ padding: '10px 14px', fontWeight: 600, fontFamily: 'var(--font-mono)', fontSize: 12 }}>{r.symbol}</td>
                          <td style={{ padding: '10px 14px', color: 'var(--text-secondary)' }}>{r.desc}</td>
                          <td style={{ padding: '10px 14px' }}>
                            <span style={{ fontSize: 10, padding: '2px 7px', borderRadius: 4, background: r.assetType === 'OPT' ? '#FEF3C7' : '#DBEAFE', color: r.assetType === 'OPT' ? '#92400E' : '#1E40AF', fontWeight: 500 }}>{r.assetType || 'STK'}</span>
                          </td>
                          <td style={{ padding: '10px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)', color: r.realizedPnl >= 0 ? 'var(--gain)' : 'var(--loss)', fontWeight: 500 }}>{fmtDelta(r.realizedPnl)}</td>
                          <td style={{ padding: '10px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)', color: r.unrealizedPnl >= 0 ? 'var(--gain)' : 'var(--loss)', fontWeight: 500 }}>{fmtDelta(r.unrealizedPnl)}</td>
                          <td style={{ padding: '10px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)', color: r.totalPnl >= 0 ? 'var(--gain)' : 'var(--loss)', fontWeight: 600 }}>{fmtDelta(r.totalPnl)}</td>
                        </tr>
                      ))}
                      <tr style={{ background: 'var(--bg)', fontWeight: 700 }}>
                        <td colSpan={3} style={{ padding: '12px 14px', textTransform: 'uppercase', fontSize: 11, letterSpacing: '0.04em' }}>合计</td>
                        <td style={{ padding: '12px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)', color: realized.reduce((s,r)=>s+r.realizedPnl,0) >= 0 ? 'var(--gain)' : 'var(--loss)' }}>{fmtDelta(realized.reduce((s,r)=>s+r.realizedPnl,0))}</td>
                        <td style={{ padding: '12px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)', color: realized.reduce((s,r)=>s+r.unrealizedPnl,0) >= 0 ? 'var(--gain)' : 'var(--loss)' }}>{fmtDelta(realized.reduce((s,r)=>s+r.unrealizedPnl,0))}</td>
                        <td style={{ padding: '12px 14px', textAlign: 'right', fontFamily: 'var(--font-mono)', color: realized.reduce((s,r)=>s+r.totalPnl,0) >= 0 ? 'var(--gain)' : 'var(--loss)' }}>{fmtDelta(realized.reduce((s,r)=>s+r.totalPnl,0))}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
        )}

      </main>

      {!isViewOnly && (
        <div style={{ padding: '0 28px 28px' }}>
          <div style={{ background: '#FFFBEB', border: '1px solid #FDE68A', borderRadius: 'var(--radius)', padding: '14px 18px', fontSize: 12, color: '#92400E', lineHeight: 1.7 }}>
            <strong>IBKR Flex XML 导出：</strong> Performance &amp; Reports → Flex Queries → 创建查询 → 选择 <em>Open Positions</em> + <em>Net Asset Value (NAV) in Base</em> → 格式：XML → 运行 → 下载 → 在上方导入。
            {' '}<strong>实时数据：</strong>使用实时连接（需要本地运行 IBKR Client Portal Gateway）。
          </div>
        </div>
      )}

      <ChatAssistant positions={positions} cash={cash} realized={realized} metrics={metrics} />

      {showTweaks && (
        <div style={{ position: 'fixed', bottom: 24, right: 24, background: 'white', border: '1px solid var(--border)', borderRadius: 12, padding: 20, boxShadow: '0 8px 32px rgba(0,0,0,0.12)', zIndex: 100, width: 260 }}>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-tertiary)', marginBottom: 16 }}>Tweaks</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {['accentColor','gainColor','lossColor'].map(k => (
              <label key={k} style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                <span style={{ fontSize: 11, color: 'var(--text-secondary)', fontWeight: 500 }}>{k === 'accentColor' ? 'Accent' : k === 'gainColor' ? 'Gain Color' : 'Loss Color'}</span>
                <input type="color" value={tweaks[k]} onChange={e => updateTweak(k, e.target.value)} style={{ width: '100%', height: 32, border: '1px solid var(--border)', borderRadius: 6, cursor: 'pointer' }} />
              </label>
            ))}
            <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span style={{ fontSize: 11, color: 'var(--text-secondary)', fontWeight: 500 }}>Show Cash</span>
              <input type="checkbox" checked={tweaks.showCash} onChange={e => updateTweak('showCash', e.target.checked)} style={{ width: 16, height: 16, cursor: 'pointer' }} />
            </label>
            <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span style={{ fontSize: 11, color: 'var(--text-secondary)', fontWeight: 500 }}>Compact Table</span>
              <input type="checkbox" checked={tweaks.compactTable} onChange={e => updateTweak('compactTable', e.target.checked)} style={{ width: 16, height: 16, cursor: 'pointer' }} />
            </label>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
